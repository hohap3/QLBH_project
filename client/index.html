<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP STORE - Công nghệ cho mọi người</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/homepage.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header id="main-header"></header>

    <main class="container mt-4">
      <div
        id="hpStoreCarousel"
        class="carousel slide carousel-fade shadow-sm"
        data-bs-ride="carousel"
      >
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#hpStoreCarousel"
            data-bs-slide-to="0"
            class="active"
          ></button>
          <button
            type="button"
            data-bs-target="#hpStoreCarousel"
            data-bs-slide-to="1"
          ></button>
          <button
            type="button"
            data-bs-target="#hpStoreCarousel"
            data-bs-slide-to="2"
          ></button>
        </div>

        <div class="carousel-inner" style="border-radius: 15px">
          <div class="carousel-item active" data-bs-interval="3000">
            <img src="/img/km_1.jpg" class="d-block w-100" alt="Khuyến mãi 1" />
            <div class="carousel-caption d-none d-md-block">
              <h5>Siêu Sale Điện Thoại</h5>
              <p>Giảm giá lên đến 30% cho các dòng iPhone mới nhất.</p>
            </div>
          </div>
          <div class="carousel-item" data-bs-interval="3000">
            <img src="/img/km_2.jpg" class="d-block w-100" alt="Khuyến mãi 2" />
            <div class="carousel-caption d-none d-md-block">
              <h5>Laptop Gaming Cực Đỉnh</h5>
              <p>Tặng kèm bộ quà tặng trị giá 2 triệu đồng.</p>
            </div>
          </div>
          <div class="carousel-item" data-bs-interval="3000">
            <img src="/img/km_3.jpg" class="d-block w-100" alt="Khuyến mãi 3" />
            <div class="carousel-caption d-none d-md-block">
              <h5>Phụ Kiện Chính Hãng</h5>
              <p>Mua 1 tặng 1 áp dụng cho tai nghe AirPods.</p>
            </div>
          </div>
        </div>

        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#hpStoreCarousel"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#hpStoreCarousel"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </main>

    <section class="container mt-5">
      <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
          <h3 class="fw-bold text-primary mb-0">Sản phẩm bán chạy</h3>
          <p class="text-muted mb-0">
            Những sản phẩm được yêu thích nhất tại HP STORE
          </p>
        </div>
        <a href="#" class="btn btn-outline-primary btn-sm rounded-pill px-3"
          >Xem tất cả</a
        >
      </div>

      <div class="row" id="best-sellers-container"></div>

      <div id="bestsellers-pagination" class="mt-2"></div>
    </section>

    <section class="container mt-5">
      <div class="d-flex flex-wrap gap-2 mb-4" id="category-filter">
        <button
          class="btn btn-primary rounded-pill px-4 filter-btn active"
          data-id="all"
        >
          Tất cả
        </button>
      </div>

      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4"
        id="product-list"
      ></div>

      <div id="products-pagination" class="mt-4"></div>
    </section>

    <div id="footer-shared"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/JS/common/header.js?v=1.1"></script>
    <script type="module" src="/src/JS/homepage.js"></script>

    <script type="module">
      import { loadFooter } from "/src/JS/common/footer.js";
      document.addEventListener("DOMContentLoaded", () => {
        loadFooter();
      });
    </script>
  </body>
</html>
