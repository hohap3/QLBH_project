<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP STORE - Hồ sơ cá nhân</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <link rel="stylesheet" href="/src/styles/hoso.css" />
  </head>
  <body class="bg-light">
    <header id="main-header"></header>

    <main class="container my-5">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="profile-sidebar p-4 shadow-sm text-center">
            <div class="position-relative d-inline-block mb-3">
              <i
                class="fa-solid fa-circle-user text-secondary"
                style="font-size: 80px"
              ></i>
            </div>
            <h5 class="fw-bold mb-1" id="sidebar-fullname">Đang tải...</h5>
            <p class="text-muted small mb-3" id="sidebar-username">@username</p>

            <div
              class="bg-primary-subtle text-primary p-2 rounded-3 mb-4 fw-bold"
            >
              <i class="fa-solid fa-gem me-1"></i> Điểm tích lũy:
              <span id="sidebar-points">0</span>
            </div>

            <div
              class="nav flex-column nav-pills gap-2 text-start"
              id="v-pills-tab"
              role="tablist"
              aria-orientation="vertical"
            >
              <button
                class="nav-link active py-2.5 px-3 rounded-3"
                id="tab-info-button"
                data-bs-toggle="pill"
                data-bs-target="#tab-info"
                type="button"
                role="tab"
              >
                <i class="fa-regular fa-id-card me-2"></i>Thông tin cá nhân
              </button>
              <button
                class="nav-link py-2.5 px-3 rounded-3"
                id="tab-password-button"
                data-bs-toggle="pill"
                data-bs-target="#tab-password"
                type="button"
                role="tab"
              >
                <i class="fa-solid fa-key me-2"></i>Thay đổi mật khẩu
              </button>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <div
            class="profile-content p-4 shadow-sm tab-content"
            id="v-pills-tabContent"
          >
            <div
              class="tab-pane fade show active"
              id="tab-info"
              role="tabpanel"
            >
              <h4 class="fw-bold text-dark mb-1">Thông tin cá nhân</h4>
              <p class="text-muted small mb-4">
                Quản lý và cập nhật thông tin tài khoản của bạn để nhận hàng
                chính xác.
              </p>

              <form id="form-update-profile">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold text-secondary"
                      >Tên đăng nhập</label
                    >
                    <input
                      type="text"
                      id="info-username"
                      class="form-control bg-light"
                      readonly
                      disabled
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold text-secondary"
                      >Họ và tên <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      id="info-fullname"
                      class="form-control"
                      required
                      placeholder="Nhập họ và tên"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold text-secondary"
                      >Số điện thoại <span class="text-danger">*</span></label
                    >
                    <input
                      type="tel"
                      id="info-phone"
                      class="form-control"
                      required
                      placeholder="Nhập số điện thoại"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold text-secondary"
                      >Địa chỉ Email</label
                    >
                    <input
                      type="email"
                      id="info-email"
                      class="form-control"
                      placeholder="example@gmail.com"
                    />
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-semibold text-secondary"
                      >Địa chỉ giao hàng</label
                    >
                    <textarea
                      id="info-address"
                      class="form-control"
                      rows="3"
                      placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."
                    ></textarea>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold text-secondary"
                      >Ngày tham gia</label
                    >
                    <input
                      type="text"
                      id="info-created-date"
                      class="form-control bg-light"
                      readonly
                      disabled
                    />
                  </div>
                  <div class="col-12 mt-4 text-end">
                    <button
                      type="submit"
                      class="btn btn-primary px-4 py-2 rounded-pill fw-bold"
                    >
                      <i class="fa-regular fa-floppy-disk me-2"></i>Lưu thay đổi
                    </button>
                  </div>
                </div>
              </form>
            </div>

            <div class="tab-pane fade" id="tab-password" role="tabpanel">
              <h4 class="fw-bold text-dark mb-1">Thay đổi mật khẩu</h4>
              <p class="text-muted small mb-4">
                Để đảm bảo an toàn, vui lòng không chia sẻ mật khẩu của bạn cho
                người khác.
              </p>

              <form id="form-change-password" style="max-width: 500px">
                <div class="mb-3">
                  <label class="form-label fw-semibold text-secondary"
                    >Mật khẩu hiện tại <span class="text-danger">*</span></label
                  >
                  <div class="input-group">
                    <input
                      type="password"
                      id="pass-current"
                      class="form-control"
                      required
                      placeholder="Nhập mật khẩu cũ"
                    />
                    <button
                      class="btn btn-outline-secondary toggle-password"
                      type="button"
                    >
                      <i class="fa fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold text-secondary"
                    >Mật khẩu mới <span class="text-danger">*</span></label
                  >
                  <div class="input-group">
                    <input
                      type="password"
                      id="pass-new"
                      class="form-control"
                      required
                      placeholder="Tối thiểu 6 ký tự"
                    />
                    <button
                      class="btn btn-outline-secondary toggle-password"
                      type="button"
                    >
                      <i class="fa fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-4">
                  <label class="form-label fw-semibold text-secondary"
                    >Xác nhận mật khẩu mới
                    <span class="text-danger">*</span></label
                  >
                  <div class="input-group">
                    <input
                      type="password"
                      id="pass-confirm"
                      class="form-control"
                      required
                      placeholder="Nhập lại mật khẩu mới"
                    />
                    <button
                      class="btn btn-outline-secondary toggle-password"
                      type="button"
                    >
                      <i class="fa fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="text-end">
                  <button
                    type="submit"
                    class="btn btn-primary px-4 py-2 rounded-pill fw-bold"
                  >
                    <i class="fa-solid fa-shield-halved me-2"></i>Cập nhật mật
                    khẩu
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-shared"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/JS/common/header.js"></script>
    <script type="module" src="/src/JS/hoso.js"></script>

    <script type="module">
      import { loadFooter } from "/src/JS/common/footer.js";

      document.addEventListener("DOMContentLoaded", () => {
        loadFooter();
      });
    </script>
  </body>
</html>
