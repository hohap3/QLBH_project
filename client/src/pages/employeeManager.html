<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP STORE - Giao diện Nhân viên</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="/src/styles/dashboard.css" />
    <link rel="stylesheet" href="/src/styles/khachhang.css" />
    <link rel="stylesheet" href="/src/styles/donhang.css" />
    <link rel="stylesheet" href="/src/styles/danh-muc.css" />
    <link rel="stylesheet" href="/src/styles/employeeManage.css" />

    <script type="module">
      import { checkAuth } from "/src/JS/auth-guard.js";
      checkAuth(["Manager", "Employee"]);
    </script>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <nav
          class="col-md-3 col-lg-3 d-md-block sidebar d-flex flex-column vh-100 p-0 border-end"
        >
          <div
            class="brand-section d-flex align-items-center p-3 border-bottom"
          >
            <div class="brand-icon me-3">
              <i class="fa-solid fa-shop"></i>
            </div>
            <div class="brand-info">
              <div class="brand-name fw-bold">HP STORE</div>
              <small class="brand-subtext text-muted"
                >Giao diện nhân viên</small
              >
            </div>
          </div>

          <div class="px-3 pt-3 pb-2">
            <a
              href="/index.html"
              class="btn btn-outline-secondary w-100 text-start d-flex align-items-center gap-2"
              style="
                border-radius: 8px;
                font-size: 0.95rem;
                transition: all 0.2s;
              "
            >
              <i class="fa-solid fa-arrow-left"></i>
              <span>Quay lại trang chủ</span>
            </a>
          </div>

          <div
            class="nav flex-column flex-grow-1 overflow-y-auto px-2 py-3"
            id="sidebarMenu"
            translate="no"
          >
            <a class="nav-link active" href="#" data-page="san-pham">
              <i class="fa-solid fa-box"></i> Quản lý sản phẩm
            </a>

            <a class="nav-link" href="#" data-page="danh-muc">
              <i class="fa-solid fa-layer-group"></i> Quản lý danh mục
            </a>

            <a class="nav-link" href="#" data-page="nha-cung-cap">
              <i class="fa-solid fa-warehouse"></i> Quản lý nhà cung cấp
            </a>

            <a class="nav-link" href="#" data-page="don-hang">
              <i class="fa-solid fa-cart-shopping"></i> Quản lý đơn hàng
            </a>

            <a class="nav-link" href="#" data-page="quanly-khohang">
              <i class="fa-solid fa-industry"></i> Quản lý kho hàng
            </a>

            <a class="nav-link" href="#" data-page="update-pass">
              <i class="fa-solid fa-lock"></i> Cập nhật mật khẩu
            </a>

            <a class="nav-link" href="#" data-page="cai-dat">
              <i class="fa-solid fa-gear"></i> Cài đặt
            </a>
          </div>

          <div class="user-section p-3 border-top mt-auto">
            <div class="d-flex align-items-center">
              <div
                class="user-avatar me-3"
                id="empAvatar"
                style="
                  background-color: #20c997;
                  width: 40px;
                  height: 40px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  color: white;
                  border-radius: 50%;
                  font-weight: bold;
                "
              >
                NV
              </div>
              <div class="user-info">
                <div class="user-name fw-semibold" id="empName"></div>
                <div
                  class="user-email text-muted text-light small"
                  id="empEmail"
                ></div>
              </div>
            </div>
          </div>
        </nav>

        <div class="col-md-9 col-lg-9 p-0 vh-100 overflow-y-auto">
          <main class="main-content p-4">
            <header
              class="d-flex justify-content-between align-items-center mb-4"
            ></header>

            <div id="dynamic-content"></div>
          </main>
        </div>
      </div>
    </div>

    <script type="module" src="/src/JS/employeeDashboard.js"></script>
  </body>
</html>
