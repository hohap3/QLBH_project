<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP STORE - Đăng nhập</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/src/styles/login.css" />
  </head>
  <body>
    <div
      class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-login-page"
    >
      <div class="card p-5 shadow-lg border-0 login-card">
        <div class="text-center mb-5">
          <div class="logo-box mb-3 shadow">
            <i class="fa-solid fa-shop"></i>
          </div>
          <h1 class="brand-name">HP STORE</h1>
          <p class="text-muted small">Đăng nhập vào cửa hàng</p>
        </div>

        <form id="loginForm">
          <div class="input-group mb-4">
            <label
              for="username"
              class="form-label d-block text-muted small fw-semibold"
              >Tên đăng nhập</label
            >
            <div class="input-wrapper">
              <i class="fa-regular fa-user input-icon"></i>
              <!-- Đổi icon từ envelope sang user -->
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Nhập tên đăng nhập"
              />
            </div>
          </div>

          <div class="input-group mb-4">
            <label
              for="password"
              class="form-label d-block text-muted small fw-semibold"
              >Mật khẩu</label
            >
            <div class="input-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="********"
              />
              <button type="button" class="eye-btn" id="togglePassword">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <div
            class="d-flex justify-content-between align-items-center mb-5 small"
          >
            <a
              href="/pages/forgot-password.html"
              class="text-decoration-none forgot-link"
              >Quên mật khẩu?</a
            >
          </div>

          <button type="submit" class="btn btn-primary w-100 py-3 submit-btn">
            Đăng nhập <i class="fa-solid fa-arrow-right ms-2"></i>
          </button>
        </form>

        <div class="text-center mt-5 text-muted small">
          <p>
            Chưa có tài khoản?
            <a
              href="/src/pages/register.html"
              class="text-decoration-none forgot-link fw-semibold"
              >Đăng ký ngay</a
            >
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/JS/login.js"></script>
  </body>
</html>
