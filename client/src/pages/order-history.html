<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử đơn hàng - HP STORE</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="/src/styles/order-history.css" />
  </head>
  <body>
    <header id="main-header"></header>

    <main class="container my-5">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="card filter-sidebar p-3">
            <div class="d-flex align-items-center gap-3 mb-3 px-2">
              <div
                class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center"
                style="width: 45px; height: 45px"
              >
                <i class="fa-solid fa-user-clock fs-5"></i>
              </div>
              <div>
                <small class="text-muted d-block">Tài khoản mua hàng</small>
                <span class="fw-bold text-dark" id="sidebar-user-name"
                  >Đang tải...</span
                >
              </div>
            </div>

            <hr class="text-muted opacity-25 my-2" />

            <div class="d-flex flex-column gap-1" id="status-filter-group">
              <a href="#" class="filter-link-item active" data-status="Tất cả">
                <span
                  ><i class="fa-solid fa-list-check me-2 text-muted"></i>Tất cả
                  đơn hàng</span
                >
                <span
                  class="badge bg-secondary-subtle text-dark rounded-pill badge-count"
                  id="count-all"
                  >0</span
                >
              </a>
              <a href="#" class="filter-link-item" data-status="Chờ xác nhận">
                <span
                  ><i
                    class="fa-solid fa-clock-rotate-left me-2 text-warning"
                  ></i
                  >Chờ xác nhận</span
                >
                <span
                  class="badge bg-secondary-subtle text-dark rounded-pill badge-count"
                  id="count-pending"
                  >0</span
                >
              </a>
              <a href="#" class="filter-link-item" data-status="Đang xử lý">
                <span
                  ><i class="fa-solid fa-spinner me-2 text-primary"></i>Đang xử
                  lý</span
                >
                <span
                  class="badge bg-secondary-subtle text-dark rounded-pill badge-count"
                  id="count-processing"
                  >0</span
                >
              </a>
              <a href="#" class="filter-link-item" data-status="Đang giao">
                <span
                  ><i class="fa-solid fa-truck-fast me-2 text-info"></i>Đang
                  giao hàng</span
                >
                <span
                  class="badge bg-secondary-subtle text-dark rounded-pill badge-count"
                  id="count-shipping"
                  >0</span
                >
              </a>
              <a href="#" class="filter-link-item" data-status="Đã giao">
                <span
                  ><i class="fa-solid fa-circle-check me-2 text-success"></i>Đã
                  giao thành công</span
                >
                <span
                  class="badge bg-secondary-subtle text-dark rounded-pill badge-count"
                  id="count-success"
                  >0</span
                >
              </a>
              <a href="#" class="filter-link-item" data-status="Đã hủy">
                <span
                  ><i class="fa-solid fa-circle-xmark me-2 text-danger"></i>Đã
                  hủy đơn</span
                >
                <span
                  class="badge bg-secondary-subtle text-dark rounded-pill badge-count"
                  id="count-canceled"
                  >0</span
                >
              </a>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0 text-purple">
              <i class="fa-solid fa-bag-shopping me-2"></i>Đơn hàng đã mua
            </h4>
            <span class="text-muted small" id="total-display-text"
              >Đang tính toán đơn hàng...</span
            >
          </div>

          <div id="order-history-list">
            <div class="text-center py-5 bg-white rounded-4 shadow-sm">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-3 mb-0 text-muted fw-medium">
                Hệ thống đang đồng bộ dữ liệu hóa đơn của bạn...
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div
      class="modal fade"
      id="invoiceModal"
      tabindex="-1"
      aria-labelledby="invoiceModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
          <div class="modal-header border-bottom-0 pt-4 px-4">
            <h5 class="modal-title fw-bold text-purple" id="invoiceModalLabel">
              <i class="fa-solid fa-file-invoice-dollar me-2"></i>HÓA ĐƠN ĐIỆN
              TỬ
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body px-4 pb-4" id="invoice-modal-body"></div>
          <div
            class="modal-footer border-top-0 px-4 pb-4 justify-content-between"
          >
            <button
              type="button"
              class="btn btn-secondary px-4"
              style="border-radius: 8px"
              data-bs-dismiss="modal"
            >
              Đóng
            </button>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-success px-4"
                style="border-radius: 8px"
                id="btn-download-pdf"
              >
                <i class="fa-solid fa-download me-2"></i>Tải về PC
              </button>
              <button
                type="button"
                class="btn btn-primary px-4 text-white"
                style="
                  background-color: #6f42c1;
                  border: none;
                  border-radius: 8px;
                "
                onclick="window.print()"
              >
                <i class="fa-solid fa-print me-2"></i>In hóa đơn
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script type="module" src="/src/JS/common/header.js"></script>
    <script type="module" src="/src/JS/order-history.js"></script>
  </body>
</html>
