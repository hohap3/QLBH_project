<div class="warehouse-container fade-in py-4 px-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="content-title mb-1">Quản lý kho hàng & Biến động</h2>
      <small class="text-muted"
        >Theo dõi lịch sử nhập xuất kho và tồn kho của sản phẩm</small
      >
    </div>
    <div class="action-buttons">
      <button class="btn btn-success me-2" id="btnExportExcel">
        <i class="fa-solid fa-file-excel me-2"></i> Xuất báo cáo Excel
      </button>
      <button
        class="btn btn-primary"
        id="btnOpenTransactionModal"
        data-bs-toggle="modal"
        data-bs-target="#modalTransaction"
      >
        <i class="fa-solid fa-plus me-2"></i> Tạo phiếu kho
      </button>
    </div>
  </div>

  <div class="card filter-card mb-4 border-0 shadow-sm">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-5">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"
              ><i class="fa-solid fa-magnifying-glass text-muted"></i
            ></span>
            <input
              type="text"
              class="form-control border-start-0 ps-0"
              id="searchWarehouse"
              placeholder="Tìm theo mã giao dịch, tên sản phẩm..."
            />
          </div>
        </div>
        <div class="col-md-4">
          <select class="form-select" id="filterLoaiGD">
            <option value="">-- Tất cả loại giao dịch --</option>
            <option value="1">Nhập kho (+)</option>
            <option value="2">Xuất kho (-)</option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-secondary w-100" id="btnResetFilter">
            <i class="fa-solid fa-arrow-rotate-left me-2"></i> Làm mới bộ lọc
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="tableWarehouse">
          <thead class="table-light">
            <tr>
              <th>Mã GD</th>
              <th>Sản phẩm</th>
              <th>Loại GD</th>
              <th class="text-end">Số lượng</th>
              <th class="text-end">Tồn trước</th>
              <th class="text-end">Tồn sau</th>
              <th>Thời gian</th>
            </tr>
          </thead>
          <tbody id="warehouseDataBody">
            <tr>
              <td colspan="7" class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <div class="mt-2">Đang tải dữ liệu lịch sử kho...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalTransaction" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-light">
        <h5 class="modal-title font-weight-bold">
          Tạo phiếu điều phối kho hàng
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form id="formWarehouseTransaction">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Mã giao dịch</label>
            <input
              type="text"
              class="form-control"
              id="txtMaGD"
              placeholder="Ví dụ: NK001, XK002..."
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Chọn Sản phẩm</label>
            <select class="form-select" id="selectProduct" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Loại giao dịch</label>
            <div class="d-flex gap-4 mt-1">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="radioLoaiGD"
                  id="radioNhap"
                  value="1"
                  checked
                />
                <label
                  class="form-check-label text-success fw-bold"
                  for="radioNhap"
                  >Nhập kho (+)</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="radioLoaiGD"
                  id="radioXuat"
                  value="2"
                />
                <label
                  class="form-check-label text-danger fw-bold"
                  for="radioXuat"
                  >Xuất kho (-)</label
                >
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Số lượng thao tác</label>
            <input
              type="number"
              class="form-control"
              id="numSoLuong"
              min="1"
              placeholder="Nhập số lượng lớn hơn 0"
              required
            />
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Hủy
          </button>
          <button type="submit" class="btn btn-primary">
            Xác nhận thực thi
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
