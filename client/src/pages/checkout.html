<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh Toán Đơn Hàng - HP STORE</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/src/styles/checkout.css" />
  </head>
  <body>
    <div class="container py-5">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="/" class="text-decoration-none text-muted">Trang chủ</a>
          </li>
          <li class="breadcrumb-item">
            <a href="#" class="text-decoration-none text-muted">Giỏ hàng</a>
          </li>
          <li
            class="breadcrumb-item active fw-semibold text-dark"
            aria-current="page"
          >
            Thanh toán
          </li>
        </ol>
      </nav>

      <h3 class="fw-bold text-dark mb-4">
        <i class="fa-solid fa-shield-heart me-2 text-primary"></i>Thanh toán đơn
        hàng
      </h3>

      <form id="checkout-form" novalidate>
        <div class="row">
          <div class="col-lg-7 mb-4">
            <div class="card checkout-card p-4 mb-4">
              <div
                class="card-title-custom d-flex align-items-center justify-content-between"
              >
                <span
                  ><i class="fa-solid fa-user-check me-2 text-primary"></i>Thông
                  tin nhận hàng</span
                >
                <small class="text-muted fw-normal"
                  >Dữ liệu tự động lấy từ tài khoản</small
                >
              </div>

              <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary"
                  >Họ và tên người nhận</label
                >
                <input
                  type="text"
                  id="checkout-fullname"
                  class="form-control form-control-lg fs-6"
                  placeholder="Đang tải dữ liệu tên..."
                  required
                />
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-semibold text-secondary"
                    >Số điện thoại liên hệ</label
                  >
                  <input
                    type="tel"
                    id="checkout-phone"
                    class="form-control form-control-lg fs-6"
                    placeholder="Đang tải số điện thoại..."
                    required
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label small fw-semibold text-secondary"
                    >Địa chỉ giao hàng</label
                  >
                  <input
                    type="text"
                    id="checkout-address"
                    class="form-control form-control-lg fs-6"
                    placeholder="Nhập địa chỉ nhận hàng chi tiết..."
                    required
                  />
                </div>
              </div>

              <div class="mb-0">
                <label class="form-label small fw-semibold text-secondary"
                  >Ghi chú đơn hàng (Tùy chọn)</label
                >
                <textarea
                  id="checkout-note"
                  class="form-control"
                  rows="2"
                  placeholder="Ví dụ: Giao ngoài giờ hành chính, gọi trước khi đến 15 phút..."
                ></textarea>
              </div>
            </div>

            <div class="card checkout-card p-4 mb-4">
              <div class="card-title-custom">
                <i class="fa-solid fa-truck-fast me-2 text-primary"></i>Cách
                thức vận chuyển
              </div>

              <div class="d-flex flex-column gap-3">
                <label class="m-0 position-relative">
                  <input
                    type="radio"
                    name="shippingMethod"
                    id="ship-standard"
                    value="0"
                    class="real-radio position-absolute top-0 start-0 opacity-0"
                    checked
                  />
                  <div
                    class="selection-box d-flex align-items-center justify-content-between"
                  >
                    <div class="d-flex align-items-center gap-3">
                      <i
                        class="fa-solid fa-boxes-packing text-secondary fs-4"
                      ></i>
                      <div>
                        <h6 class="fw-bold mb-0" style="font-size: 0.95rem">
                          Giao hàng tiêu chuẩn
                        </h6>
                        <small class="text-muted"
                          >Nhận hàng dự kiến từ 2 - 4 ngày làm việc</small
                        >
                      </div>
                    </div>
                    <span class="fw-bold text-success small">Miễn phí</span>
                  </div>
                </label>

                <label class="m-0 position-relative">
                  <input
                    type="radio"
                    name="shippingMethod"
                    id="ship-express"
                    value="30000"
                    class="real-radio position-absolute top-0 start-0 opacity-0"
                  />
                  <div
                    class="selection-box d-flex align-items-center justify-content-between"
                  >
                    <div class="d-flex align-items-center gap-3">
                      <i class="fa-solid fa-bolt text-warning fs-4"></i>
                      <div>
                        <h6 class="fw-bold mb-0" style="font-size: 0.95rem">
                          Giao hàng hỏa tốc (Express)
                        </h6>
                        <small class="text-muted"
                          >Giao nhanh bằng shipper nội thành trong ngày</small
                        >
                      </div>
                    </div>
                    <span class="fw-bold text-dark small">+30.000 đ</span>
                  </div>
                </label>
              </div>
            </div>

            <div class="card checkout-card p-4">
              <div class="card-title-custom">
                <i class="fa-solid fa-credit-card me-2 text-primary"></i>Phương
                thức thanh toán
              </div>

              <div class="d-flex flex-column gap-3">
                <label class="m-0 position-relative">
                  <input
                    type="radio"
                    name="paymentMethod"
                    value="COD"
                    class="real-radio position-absolute top-0 start-0 opacity-0"
                    checked
                  />
                  <div
                    class="selection-box d-flex align-items-center justify-content-between"
                  >
                    <div class="d-flex align-items-center gap-3">
                      <i
                        class="fa-solid fa-hand-holding-dollar text-success fs-4"
                      ></i>
                      <div>
                        <h6 class="fw-bold mb-0" style="font-size: 0.95rem">
                          Thanh toán khi nhận hàng (COD)
                        </h6>
                        <small class="text-muted"
                          >Trả tiền mặt trực tiếp cho nhân viên giao hàng</small
                        >
                      </div>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                  </div>
                </label>

                <label class="m-0 position-relative">
                  <input
                    type="radio"
                    name="paymentMethod"
                    value="CHUYEN_KHOAN"
                    class="real-radio position-absolute top-0 start-0 opacity-0"
                  />
                  <div
                    class="selection-box d-flex align-items-center justify-content-between"
                  >
                    <div class="d-flex align-items-center gap-3">
                      <i class="fa-solid fa-qrcode text-primary fs-4"></i>
                      <div>
                        <h6 class="fw-bold mb-0" style="font-size: 0.95rem">
                          Chuyển khoản qua Ngân hàng / Mã QR
                        </h6>
                        <small class="text-muted"
                          >Quét mã QR bằng ứng dụng Mobile Banking của
                          bạn</small
                        >
                      </div>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                  </div>
                </label>
              </div>
            </div>
          </div>

          <div class="col-lg-5">
            <div
              class="card checkout-card p-4 position-sticky"
              style="top: 24px"
            >
              <div class="card-title-custom">
                <i class="fa-solid fa-bag-shopping me-2 text-primary"></i>Đơn
                hàng của bạn
              </div>

              <div id="checkout-items-list" class="style-scroll mb-3"></div>

              <hr class="text-muted" />

              <div class="d-flex justify-content-between mb-2 fs-6">
                <span class="text-muted">Tiền hàng tạm tính:</span>
                <span id="checkout-subtotal" class="fw-bold text-dark"
                  >0 đ</span
                >
              </div>
              <div class="d-flex justify-content-between mb-2 fs-6">
                <span class="text-muted">Phí vận chuyển:</span>
                <span id="checkout-shipping-fee" class="fw-bold text-success"
                  >Miễn phí</span
                >
              </div>

              <hr class="text-muted" />

              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <span class="fw-bold text-dark fs-5">Tổng thanh toán:</span>
                <span id="checkout-total" class="fw-bold text-danger fs-3"
                  >0 đ</span
                >
              </div>

              <button
                type="submit"
                class="btn btn-primary btn-lg w-100 fw-bold py-3"
                style="
                  border-radius: 10px;
                  background-color: var(--primary-color);
                  border: none;
                "
              >
                <i class="fa-solid fa-lock me-2"></i>XÁC NHẬN ĐẶT HÀNG
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div id="footer-shared"></div>

    <script type="module" src="/src/JS/checkout.js"></script>
  </body>
</html>
