<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP STORE - Admin Dashboard</title>

    <!-- Link Bootstrap & FontAwesome -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- LINK FILE CSS RIÊNG TẠI ĐÂY -->
    <link rel="stylesheet" href="/src/styles/dashboard.css" />
    <link rel="stylesheet" href="/src/styles/khachhang.css" />
    <link rel="stylesheet" href="/src/styles/donhang.css" />
    <link rel="stylesheet" href="/src/styles/danh-muc.css" />
    <link rel="stylesheet" href="/src/styles/tong-quan.css" />

    <!-- Auth Guard để kiểm tra quyền Admin -->
    <script type="module" src="/src/JS/auth-guard.js"></script>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <nav
          class="col-md-3 col-lg-3 d-md-block sidebar-fixed d-flex flex-column p-0"
          id="hpStoreSidebar"
        >
          <div class="brand-section d-flex align-items-center p-3 text-white">
            <div
              class="brand-icon me-3 d-flex align-items-center justify-content-center"
            >
              <i class="fa-solid fa-shop fs-4"></i>
            </div>
            <div class="brand-info">
              <div class="brand-name fw-bold fs-5">HP STORE</div>
              <small class="brand-subtext">Hệ thống quản lý bán hàng</small>
            </div>
          </div>

          <div class="px-3 pb-2">
            <a
              href="/"
              class="btn w-100 text-start text-white d-flex align-items-center gap-2"
              style="
                background-color: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 8px;
                transition: all 0.3s;
              "
              onmouseover="
                this.style.backgroundColor = 'rgba(255, 255, 255, 0.25)'
              "
              onmouseout="
                this.style.backgroundColor = 'rgba(255, 255, 255, 0.15)'
              "
            >
              <i class="fa-solid fa-arrow-left-long"></i>
              <span>Quay lại trang chủ</span>
            </a>
          </div>
          <hr class="text-white-50 my-1 mx-3" />

          <div
            class="nav flex-column flex-grow-1 overflow-y-auto px-3 py-2"
            id="sidebarMenu"
            translate="no"
          >
            <a class="nav-link active" href="#" data-page="tong-quan">
              <i class="fa-solid fa-table-columns"></i> <span>Tổng quan</span>
            </a>

            <a class="nav-link" href="#" data-page="san-pham">
              <i class="fa-solid fa-box"></i> <span>Sản phẩm</span>
            </a>

            <a class="nav-link" href="#" data-page="danh-muc">
              <i class="fa-solid fa-layer-group"></i> <span>Danh mục</span>
            </a>

            <a class="nav-link" href="#" data-page="nha-cung-cap">
              <i class="fa-solid fa-warehouse"></i> <span>Nhà cung cấp</span>
            </a>

            <a class="nav-link" href="#" data-page="quanly-nhanvien">
              <i class="fa-solid fa-user-check"></i>
              <span>Quản lý nhân viên</span>
            </a>

            <a class="nav-link" href="#" data-page="khach-hang">
              <i class="fa-solid fa-user"></i>
              <span>Quản lý khách hàng</span>
            </a>

            <a class="nav-link" href="#" data-page="don-hang">
              <i class="fa-solid fa-cart-shopping"></i> <span>Đơn hàng</span>
            </a>

            <a class="nav-link" href="#" data-page="quanly-khohang">
              <i class="fa-solid fa-industry"></i> <span>Kho hàng</span>
            </a>

            <a class="nav-link" href="#" data-page="update-pass">
              <i class="fa-solid fa-lock"></i>
              <span>Cập nhật lại mật khẩu</span>
            </a>

            <a class="nav-link" href="#" data-page="cai-dat">
              <i class="fa-solid fa-gear"></i> <span>Cài đặt</span>
            </a>
          </div>

          <div class="p-3 mt-auto">
            <div class="user-section d-flex align-items-center p-2 text-white">
              <div class="user-avatar me-3" id="empAvatar">AD</div>
              <div class="user-info">
                <div class="user-name fw-semibold" id="empName"></div>
                <div class="user-email" id="empEmail"></div>
              </div>
            </div>
          </div>
        </nav>

        <div class="col-md-9 col-lg-9 p-0 main-wrapper">
          <main class="main-content p-4 min-vh-100 d-flex flex-column bg-light">
            <div id="dynamic-content" class="flex-grow-1"></div>
          </main>
        </div>
      </div>
    </div>

    <!-- Nhúng file Logic chuyển trang -->
    <script type="module" src="/src/JS/dashboard.js"></script>
  </body>
</html>
